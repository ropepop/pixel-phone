version: "3.9"

services:
  agent:
    image: ${ARBUZAS_PORTAINER_AGENT_IMAGE}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
    networks:
      - agent_network
    deploy:
      mode: global
      placement:
        constraints:
          - node.platform.os == linux
      restart_policy:
        condition: any
        delay: 5s
      update_config:
        parallelism: 1
        order: stop-first
        failure_action: rollback
        monitor: 30s
      rollback_config:
        parallelism: 1
        order: stop-first

  portainer:
    image: ${ARBUZAS_PORTAINER_SERVER_IMAGE}
    command:
      - -H
      - tcp://tasks.agent:9001
      - --tlsskipverify
    ports:
      - target: 9443
        published: 9443
        protocol: tcp
        mode: host
    volumes:
      - /srv/arbuzas/portainer:/data
    networks:
      - agent_network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any
        delay: 5s
      update_config:
        parallelism: 1
        order: stop-first
        failure_action: rollback
        monitor: 30s
      rollback_config:
        parallelism: 1
        order: stop-first

networks:
  agent_network:
    driver: overlay
    attachable: true
